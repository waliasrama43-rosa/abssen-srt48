<script>
    const URL_GAS = "https://script.google.com/macros/s/AKfycbz3sE7UYoTFgAClHIa4rWsOBSx_IFRCzHLFMnfdhhxLcOiKEiA9r52uF6mGqQ8SVAvh/exec";

    // AMBIL DATA DARI SHEETS SAAT WEB DIBUKA
    window.onload = function() {
        fetch(URL_GAS)
            .then(res => res.json())
            .then(data => {
                const selectKegiatan = document.getElementById("kegiatan");
                const selectTendik = document.getElementById("adminName"); // Ubah input jadi select
                
                data.kegiatan.forEach(k => {
                    selectKegiatan.innerHTML += `<option value="${k}">${k}</option>`;
                });
                data.tendik.forEach(t => {
                    selectTendik.innerHTML += `<option value="${t}">${t}</option>`;
                });
            });
    };

    // FUNGSI TAMBAH TENDIK/KEGIATAN TANPA CODING
    function tambahSetting(tipe) {
        const nilai = prompt(`Masukkan nama ${tipe} baru:`);
        if (!nilai) return;

        fetch(URL_GAS, {
            method: 'POST',
            body: JSON.stringify({ action: "addSetting", type: tipe, value: nilai })
        }).then(() => {
            alert("Berhasil! Silakan refresh halaman.");
            location.reload();
        });
    }
</script>

<div class="mt-4 p-2 border-top">
    <p class="small text-muted">Menu Admin:</p>
    <button class="btn btn-sm btn-outline-secondary" onclick="tambahSetting('tendik')">+ Tambah Tendik</button>
    <button class="btn btn-sm btn-outline-secondary" onclick="tambahSetting('kegiatan')">+ Tambah Kegiatan</button>
</div>
