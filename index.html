<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absen Sekolah Rakyat - Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-light">

<div class="container mt-4">
    <div class="card shadow-lg mx-auto" style="max-width: 500px; border-radius: 15px;">
        <div class="card-header bg-dark text-white text-center" style="border-radius: 15px 15px 0 0;">
            <h5 class="mb-0">Scanner Absensi Siswa</h5>
        </div>
        <div class="card-body">
            
            <div class="mb-3">
                <label class="form-label fw-bold">Pilih Kegiatan:</label>
                <select id="kegiatan" class="form-select form-select-lg">
                    <option value="Sholat Berjamaah">Sholat Berjamaah</option>
                    <option value="Makan Pagi">Makan Pagi</option>
                    <option value="Sekolah">Sekolah</option>
                </select>
            </div>

            <div id="reader" style="width: 100%; border-radius: 10px; overflow: hidden;" class="bg-secondary mb-3"></div>

            <div id="status" class="alert alert-info text-center d-none">
                Sedang memproses...
            </div>

            <div class="text-center mt-3">
                <p class="text-muted small">Arahkan kamera ke QR Code di kartu siswa</p>
                <hr>
                <div class="d-flex gap-2">
                     <input type="number" id="nisnManual" class="form-control" placeholder="Atau ketik NISN manual...">
                     <button class="btn btn-primary" onclick="kirimData(document.getElementById('nisnManual').value)">Kirim</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    // MASUKKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
    const URL_GAS = "https://script.google.com/macros/s/AKfycbz3sE7UYoTFgAClHIa4rWsOBSx_IFRCzHLFMnfdhhxLcOiKEiA9r52uF6mGqQ8SVAvh/exec"; 

    // 1. Inisialisasi Scanner
    const html5QrCode = new Html5Qrcode("reader");
    const qrConfig = { fps: 10, qrbox: { width: 250, height: 250 } };

    // Mulai Kamera Otomatis
    html5QrCode.start({ facingMode: "environment" }, qrConfig, onScanSuccess);

    function onScanSuccess(decodedText, decodedResult) {
        // Hentikan scan sebentar agar tidak mengirim berkali-kali dalam sedetik
        html5QrCode.pause(); 
        
        // Mainkan suara bip sederhana (opsional)
        alert("Terdeteksi NISN: " + decodedText);
        
        // Kirim ke Google Sheets
        kirimData(decodedText);
    }

    function kirimData(nisnValue) {
        if(!nisnValue) return;

        const statusDiv = document.getElementById("status");
        statusDiv.classList.remove("d-none");
        statusDiv.innerHTML = "Mengirim data " + nisnValue + "...";

        const paketData = {
            nisn: nisnValue,
            kegiatan: document.getElementById("kegiatan").value,
            namaPendidik: "Wali Asrama"
        };

        fetch(URL_GAS, {
            method: 'POST',
            mode: 'no-cors', // Menghindari masalah kebijakan keamanan browser
            body: JSON.stringify(paketData)
        })
        .then(() => {
            statusDiv.innerHTML = "✅ Berhasil dicatat!";
            statusDiv.className = "alert alert-success text-center";
            
            // Tunggu 2 detik lalu aktifkan kamera lagi untuk siswa berikutnya
            setTimeout(() => {
                statusDiv.classList.add("d-none");
                document.getElementById('nisnManual').value = "";
                html5QrCode.resume();
            }, 2000);
        })
        .catch(err => {
            alert("Gagal kirim: " + err);
            html5QrCode.resume();
        });
    }
</script>

</body>
</html>
